<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Editti Reali — Aral Maktar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="Immagini/Favicon_aral.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --parchment: #f2e8c9; --parchment-dark: #e0ccA0; --ink: #2a1a0a;
      --ink-light: #5c3d1e; --ink-faded: #8b6340; --gold: #c8972a;
      --gold-light: #e8b84b; --crimson: #7a1a1a;
    }
    html { scroll-behavior: smooth; }
    body { background-color: #1a1008; color: var(--ink); font-family: 'IM Fell English', Georgia, serif; font-size: 17px; line-height: 1.75; overflow-x: hidden; }
    body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 9999; opacity: 0.03; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); background-size: 200px 200px; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #1a1008; }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 4px; }

    @font-face { font-family: 'GoudyInitialen'; src: url('Font/GoudyInitialen.ttf') format('truetype'); }

    /* ─── NAV ─── */
    nav { position: -webkit-sticky; position: sticky; top: env(safe-area-inset-top, 0px); z-index: 100; background: rgba(20,12,4,0.95); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(200,151,42,0.2); display: flex; justify-content: center; flex-wrap: wrap; }
    nav a { font-family: 'Cinzel', serif; font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--parchment-dark); text-decoration: none; padding: 1rem 1.8rem; border-right: 1px solid rgba(200,151,42,0.1); transition: color 0.3s, background 0.3s; }
    nav a:first-child { border-left: 1px solid rgba(200,151,42,0.1); }
    nav a:hover { color: var(--gold-light); background: rgba(200,151,42,0.06); }

    /* ─── HERO ─── */
    header { position: relative; min-height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; text-align: center; padding: 4rem 2rem 5vh;
      background: linear-gradient(to bottom, rgba(10,5,0,0.55) 0%, rgba(26,16,8,0.72) 60%, rgba(26,16,8,1) 100%), url('Immagini/Editti.webp') center center / cover no-repeat; overflow: hidden; }
    .hero-ornament { color: var(--gold); font-size: 1.8rem; letter-spacing: 0.5em; margin-bottom: 1.5rem; animation: fadeIn 2s ease both; }
    h1.page-title { font-family: 'Cinzel Decorative', serif; font-size: clamp(2rem, 7vw, 4.5rem); font-weight: 700; color: var(--gold-light); text-shadow: 0 0 40px rgba(200,151,42,0.4), 0 2px 0 rgba(0,0,0,0.8); letter-spacing: 0.06em; line-height: 1.15; animation: heroReveal 1.5s cubic-bezier(.16,1,.3,1) both; }
    .hero-sub { font-family: 'IM Fell English', serif; font-style: italic; font-size: clamp(0.95rem, 2vw, 1.25rem); color: var(--parchment-dark); margin-top: 0.75rem; opacity: 0.75; letter-spacing: 0.1em; animation: fadeIn 2s 0.8s ease both; }
    .hero-divider { margin: 2rem auto; width: 220px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); animation: fadeIn 2s 1s ease both; }

    /* ─── EDICTS ─── */
    .edicts-wrap { max-width: 800px; margin: 0 auto; padding: 3rem 2rem 5rem; }

    .edict {
      background: linear-gradient(135deg, rgba(242,232,201,0.97) 0%, rgba(224,204,160,0.95) 100%);
      border: 1px solid rgba(200,151,42,0.4);
      border-radius: 2px;
      padding: 3rem 3rem 2.5rem;
      margin-bottom: 3rem;
      box-shadow: 0 4px 40px rgba(0,0,0,0.5), inset 0 0 60px rgba(200,151,42,0.06);
    }

    .edict-header {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--parchment-dark);
    }

    .edict-label {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      display: block;
      margin-bottom: 0.5rem;
    }

    .edict-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.6rem;
      color: var(--crimson);
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }

    .edict-date {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 0.9rem;
      color: var(--ink-faded);
    }

    .edict-body {
      margin-bottom: 2rem;
    }

    .edict-body p {
      margin-bottom: 1rem;
      text-align: justify;
    }

    .edict-body .drop-cap::first-letter {
      font-family: 'GoudyInitialen', serif;
      font-size: 3.8rem;
      float: left;
      line-height: 0.65;
      margin: 0.08em 0.12em 0 0;
      color: var(--crimson);
    }

    .edict-body ul, .edict-body ol {
      margin: 1rem 0 1rem 1.5rem;
    }

    .edict-body li {
      margin-bottom: 0.5rem;
    }

    /* ─── SIGNATURE ─── */
    .edict-signature {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--parchment-dark);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 2rem;
    }

    .signature-block {
      text-align: center;
    }

    .signature-name {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-faded);
      margin-top: 0.3rem;
    }

    .signature-title {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 0.8rem;
      color: var(--ink-faded);
    }

    .signature-img {
      max-width: 280px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .seal-img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }

    /* ─── FOOTER ─── */
    footer { text-align: center; padding: 3rem 1rem; padding-bottom: env(safe-area-inset-bottom, 0px); border-top: 1px solid rgba(200,151,42,0.15); color: var(--parchment-dark); opacity: 0.5; font-size: 0.85rem; }
    footer a { color: var(--gold); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ─── ANIMATIONS ─── */
    @keyframes heroReveal { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    [data-reveal] { opacity: 0; transform: translateY(30px); transition: opacity 0.6s ease, transform 0.6s ease; }
    [data-reveal].visible { opacity: 1; transform: translateY(0); }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 600px) {
      .edict { padding: 2rem 1.5rem; }
      .edict-signature { flex-direction: column; align-items: center; gap: 1.5rem; }
      .signature-img { max-width: 200px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html">← Aral Maktar</a>
</nav>

<header>
  <div class="hero-ornament">— ✦ —</div>
  <h1 class="page-title">Editti Reali</h1>
  <p class="hero-sub">Decreti e proclami dalla Corona di Aral Maktar</p>
  <div class="hero-divider"></div>
</header>

<div class="edicts-wrap" id="editti-container"></div>

<footer>
  <a href="index.html">Aral Maktar</a> — Editti Reali
</footer>

<script src="editti_data.js"></script>
<script>
// ── GENERA EDITTI DA editti_data.js ──
(function() {
  var container = document.getElementById('editti-container');
  if (!container || typeof EDITTI === 'undefined') return;
  var html = '';
  for (var i = 0; i < EDITTI.length; i++) {
    var e = EDITTI[i];
    html += '<div class="edict" data-reveal>';
    html += '<div class="edict-header">';
    html += '<span class="edict-label">Editto Reale</span>';
    html += '<h2 class="edict-title">' + e.titolo + '</h2>';
    html += '<span class="edict-date">' + e.data + '</span>';
    html += '</div>';
    html += '<div class="edict-body">';
    for (var j = 0; j < e.corpo.length; j++) {
      var b = e.corpo[j];
      if (b.tipo === 'drop-cap') {
        html += '<p class="drop-cap">' + b.testo + '</p>';
      } else if (b.tipo === 'p') {
        html += '<p>' + b.testo + '</p>';
      } else if (b.tipo === 'ol') {
        html += '<ol>';
        for (var k = 0; k < b.voci.length; k++) {
          html += '<li>' + b.voci[k] + '</li>';
        }
        html += '</ol>';
      } else if (b.tipo === 'ul') {
        html += '<ul>';
        for (var k = 0; k < b.voci.length; k++) {
          html += '<li>' + b.voci[k] + '</li>';
        }
        html += '</ul>';
      }
    }
    html += '</div>';
    html += '<div class="edict-signature">';
    html += '<div class="signature-block"><img src="Immagini/Firma_raziel.webp" alt="Firma di Raziel Firelair" class="signature-img"></div>';
    html += '<div class="signature-block"><img src="Immagini/Sigillo.webp" alt="Sigillo Reale di Aral Maktar" class="seal-img"></div>';
    html += '</div>';
    html += '</div>';
  }
  container.innerHTML = html;
})();
</script>
<script>
// ── SCROLL REVEAL ──
(function() {
  var els = document.querySelectorAll('[data-reveal]');
  if (!els.length) return;
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
    });
  }, { threshold: 0.15 });
  els.forEach(function(el, i) {
    el.style.transitionDelay = (i * 80) + 'ms';
    obs.observe(el);
  });
})();
</script>

</body>
</html>
